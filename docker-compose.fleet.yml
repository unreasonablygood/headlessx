# HeadlessX v2.x — fleet-minimal flattened compose for Coolify.
# Lives at the REPO ROOT (docker_compose_location: /docker-compose.fleet.yml) so
# build `context: .` resolves to the repo root under Coolify's --project-directory.
# (A compose under infra/docker/ with `context: ../../` broke: ../../ climbed past
# the repo root to / under Coolify's project-directory resolution → lstat /infra.)
#
# Derived from infra/docker/docker-compose.yml: profiles removed (Coolify doesn't
# pass --profile all), worker+web dropped (API-only scraping), host ports removed
# for internal deps, container_name removed, the ../../apps/api/models bind-mount
# dropped (models are baked into the api image via api.Dockerfile). api is the only
# host-published service (Tailscale :38473). Secrets resolve from Coolify env rows.
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-headlessx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-headlessx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network

  html-to-md:
    build:
    restart: unless-stopped
      context: .
      dockerfile: apps/go-html-to-md-service/Dockerfile
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network

  yt-engine:
    build:
    restart: unless-stopped
      context: .
      dockerfile: infra/docker/yt-engine.Dockerfile
    environment:
      - YT_ENGINE_PORT=${YT_ENGINE_PORT:-8090}
      - YT_ENGINE_TEMP_DIR=${YT_ENGINE_TEMP_DIR:-/app/tmp/yt-engine}
      - YT_ENGINE_JOB_TTL_HOURS=${YT_ENGINE_JOB_TTL_HOURS:-12}
    volumes:
      - yt_engine_tmp:/app/tmp/yt-engine
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - headlessx-network

  api:
    build:
    restart: unless-stopped
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      html-to-md:
        condition: service_healthy
      yt-engine:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-headlessx}?schema=public
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - HTML_TO_MARKDOWN_SERVICE_URL=${HTML_TO_MARKDOWN_SERVICE_URL:-http://html-to-md:8080}
      - HTML_TO_MARKDOWN_TIMEOUT_MS=${HTML_TO_MARKDOWN_TIMEOUT_MS:-60000}
      - PORT=${PORT:-8000}
      - HOST=${HOST:-0.0.0.0}
      - NODE_ENV=production
      - WEB_PORT=${WEB_PORT:-3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:34872}
      - DASHBOARD_INTERNAL_API_KEY=${DASHBOARD_INTERNAL_API_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - YT_ENGINE_URL=${YT_ENGINE_URL:-http://yt-engine:8090}
      - YT_ENGINE_TIMEOUT_MS=${YT_ENGINE_TIMEOUT_MS:-45000}
      - BROWSER_WINDOW_WIDTH=${BROWSER_WINDOW_WIDTH:-}
      - BROWSER_WINDOW_HEIGHT=${BROWSER_WINDOW_HEIGHT:-}
      - BULLMQ_QUEUE_NAME=${BULLMQ_QUEUE_NAME:-headlessx-jobs}
      - QUEUE_WORKER_CONCURRENCY=${QUEUE_WORKER_CONCURRENCY:-2}
      - QUEUE_JOB_ATTEMPTS=${QUEUE_JOB_ATTEMPTS:-3}
      - QUEUE_JOB_BACKOFF_MS=${QUEUE_JOB_BACKOFF_MS:-5000}
      - QUEUE_STREAM_POLL_MS=${QUEUE_STREAM_POLL_MS:-1000}
    ports:
      - "${API_HOST_PORT:-38473}:${PORT:-8000}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - browser_profile:/app/apps/api/data/browser-profile
    networks:
      - headlessx-network

volumes:
  pgdata:
  browser_profile:
    restart: unless-stopped
  yt_engine_tmp:

    restart: unless-stopped
networks:
  headlessx-network:
    driver: bridge
    restart: unless-stopped
    ipam:
      driver: default
      config:
        - subnet: 10.99.0.0/24
