# docker-compose.headfox.yml — dedicated compose for the headfox-js Camoufox server.
#
# Deployed as a SEPARATE Coolify app so it does NOT touch the running headlessx-v2
# scrape stack. `browser remote` (pi-config browser skill) attaches to this server's
# wsEndpoint via `playwright-cli attach`, driving the remote anti-detection Camoufox
# for interactive flows.
#
# The ws_path TOKEN (HEADFOX_WS_PATH) is the secret — minted to 1Password as
# op://m3_local/HEADFOX_WS_PATH/credential + injected via Coolify env, resolved
# value-blind by the browser skill. The browser skill constructs
# ws://<HEADFOX_HOST>/<token>; the launcher prepends '/' for the ws_path.
# Auth = Tailscale-only (the server binds the tailnet IP, not 0.0.0.0) + the
# secret ws_path token (Playwright validates the path).
#
# network_mode: host (not a bridge subnet) — the beelink's docker address pools
# are fully subnetted (fleet-wide network-pool exhaustion, pi-config-1d2), so
# creating a bridge network fails. Host networking avoids that; the port
# (HEADFOX_PORT, def 9334) is on the host directly (Tailscale 100.83.166.127:9334).
services:
  headfox-server:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    working_dir: /app/apps/api
    command: ['sh', '-c', 'Xvfb :99 -screen 0 1280x720x24 >/dev/null 2>&1 & sleep 1 && DISPLAY=:99 exec node /app/apps/api/headfox-server.mjs']
    restart: unless-stopped
    network_mode: host
    environment:
      - HEADFOX_PORT=${HEADFOX_PORT:-9334}
      - HEADFOX_WS_PATH=${HEADFOX_WS_PATH}
      - HEADFOX_HUMANIZE=${HEADFOX_HUMANIZE:-0}
      - HEADFOX_GEOIP=${HEADFOX_GEOIP:-false}
      - HEADFOX_BLOCK_WEBRTC=${HEADFOX_BLOCK_WEBRTC:-true}
      - HEADFOX_BLOCK_IMAGES=${HEADFOX_BLOCK_IMAGES:-false}
      - HEADFOX_ENABLE_CACHE=${HEADFOX_ENABLE_CACHE:-true}
      - HEADFOX_HEADLESS=${HEADFOX_HEADLESS:-true}
    volumes:
      - headfox_profile:/app/.headfox/profile

volumes:
  headfox_profile:
